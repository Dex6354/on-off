<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Status Test</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; transition: 0.5s; }
        .status-box { padding: 20px; border-radius: 10px; color: white; font-weight: bold; font-size: 2rem; }
        .online { background: #2ecc71; }
        .offline { background: #e74c3c; }
    </style>
</head>
<body>
    <div id="box" class="status-box online">STATUS: ATIVO</div>
    <p id="timer">Ficando offline em: <span id="count">10</span>s</p>

    <script>
        // --- CONFIGURAÇÃO ---
        let tempoSegundos = 10; 
        // --------------------

        const countDisplay = document.getElementById('count');
        const box = document.getElementById('box');

        const countdown = setInterval(() => {
            tempoSegundos--;
            countDisplay.innerText = tempoSegundos;

            if (tempoSegundos <= 0) {
                clearInterval(countdown);
                box.innerText = "STATUS: OFFLINE";
                box.className = "status-box offline";
                document.getElementById('timer').innerText = "Você está desconectado.";
            }
        }, 1000);
    </script>
</body>
</html>
